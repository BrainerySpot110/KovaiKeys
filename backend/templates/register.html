<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovai Keys — Register</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>

<body data-bg="auth">

    <header class="topbar">
        <div class="topbar__inner">
            <a href="/" class="brand">
                <span class="brand__mark">KK</span>
                <span class="brand__name">Kovai Keys</span>
            </a>
        </div>
    </header>

    <div class="auth-shell">
        <div class="id-card">
            <div class="id-card__eyebrow">New Visitor Pass</div>
            <h1>Create your account</h1>

            <div class="field">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Jane Doe">
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <div class="field">
                <label>I am a...</label>
                <div class="role-picker">

                    <input type="radio" name="role" id="role-owner" value="Owner" checked>
                    <label for="role-owner">🏠 Owner</label>

                    <input type="radio" name="role" id="role-broker" value="Broker">
                    <label for="role-broker">🧭 Broker</label>

                    <input type="radio" name="role" id="role-buyer" value="Buyer">
                    <label for="role-buyer">🔑 Buyer</label>

                    <input type="radio" name="role" id="role-rent" value="Rent">
                    <label for="role-rent">📄 Renter</label>

                </div>
            </div>

            <button class="btn--block" onclick="register()">Create Account</button>

            <p id="message"></p>

            <div class="id-card__footer">
                Already have an account? <a href="/login-page">Login</a>
            </div>

            <a href="/" class="id-card__back">← Back to Home</a>
        </div>
    </div>

    <div id="toast-stack"></div>

    <script src="{{ url_for('static', path='script.js') }}"></script>
</body>

</html>
