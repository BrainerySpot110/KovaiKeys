<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied — Kovai Keys</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>

<body data-bg="denied">

    <header class="topbar">
        <div class="topbar__inner">
            <a href="/" class="brand">
                <span class="brand__mark">KK</span>
                <span class="brand__name">Kovai Keys</span>
            </a>
        </div>
    </header>

    <div class="auth-shell">
        <div class="id-card" style="text-align: center;">
            <div class="denied-icon">🚫</div>
            <div class="id-card__eyebrow">Restricted Area</div>
            <h1>Access Denied</h1>

            <p>{{ message }}</p>

            <p style="font-family: var(--font-mono); font-size: 13px; color: var(--ink-500);">
                Signed in as: <strong style="color: var(--rust-600);">{{ current_role }}</strong>
            </p>

            <a href="/login-page" class="btn btn--block" style="margin-top: 10px;">Log In With a Different Account</a>

            <a href="/" class="id-card__back">← Back to Home</a>
        </div>
    </div>


</body>

</html>
