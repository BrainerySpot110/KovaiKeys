<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovai Keys — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>

<body data-bg="auth">

    <header class="topbar">
        <div class="topbar__inner">
            <a href="/" class="brand">
                <span class="brand__mark">KK</span>
                <span class="brand__name">Kovai Keys</span>
            </a>
        </div>
    </header>

    <div class="auth-shell">
        <div class="id-card">
            <div class="id-card__eyebrow">Visitor Pass</div>
            <h1>Welcome back</h1>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn--block" onclick="login()">Log In</button>

            <p id="message"></p>

            <div class="id-card__footer">
                Don't have a pass yet? <a href="/register-page">Register</a>
            </div>

            <a href="/" class="id-card__back">← Back to Home</a>
        </div>
    </div>

    <div id="toast-stack"></div>

    <script src="{{ url_for('static', path='script.js') }}"></script>
</body>

</html>
